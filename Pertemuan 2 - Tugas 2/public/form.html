<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Form data penerima manfaat program Makan Bergizi Gratis" />
  <title>Form Penerima Manfaat — Makan Bergizi Gratis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <a href="/" class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2">
        <i class="bi bi-egg-fried fs-4"></i>
        EEMBEGE
      </a>
      <a href="/" class="btn btn-outline-secondary d-flex align-items-center gap-2">
        <i class="bi bi-arrow-left"></i>
        Kembali
      </a>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">

          <h1 id="pageTitle" class="h3 fw-bold mb-1">Tambah Data Penerima Manfaat</h1>
          <p id="pageDescription" class="text-body-secondary mb-0">
            Lengkapi data penerima manfaat program Makan Bergizi Gratis pada form berikut.
          </p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
          <h5 class="card-title mb-0 fw-bold d-flex align-items-center gap-2">
            <i class="bi bi-pencil-square text-primary"></i>
            Data Penerima
          </h5>
        </div>
        <div class="card-body p-4">
          <div id="alertContainer"></div>
          <form id="penerimaForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="namaLengkap" class="form-label fw-semibold">
                  Nama Lengkap <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control" id="namaLengkap" name="namaLengkap"
                  placeholder="Masukkan nama lengkap" required />
                <div class="invalid-feedback" id="error-namaLengkap"></div>
              </div>
              <div class="col-md-6">
                <label for="jenisKelamin" class="form-label fw-semibold">
                  Jenis Kelamin <span class="text-danger">*</span>
                </label>
                <select class="form-select" id="jenisKelamin" name="jenisKelamin" required>
                  <option value="">Pilih jenis kelamin</option>
                  <option value="Laki-laki">Laki-laki</option>
                  <option value="Perempuan">Perempuan</option>
                </select>
                <div class="invalid-feedback" id="error-jenisKelamin"></div>
              </div>
              <div class="col-12">
                <label for="alamat" class="form-label fw-semibold">
                  Alamat <span class="text-danger">*</span>
                </label>
                <textarea class="form-control" id="alamat" name="alamat" rows="3" placeholder="Masukkan alamat lengkap"
                  required></textarea>
                <div class="invalid-feedback" id="error-alamat"></div>
              </div>
              <div class="col-md-6">
                <label for="alergi" class="form-label fw-semibold">
                  Alergi <span class="text-danger">*</span>
                </label>
                <select class="form-select" id="alergi" name="alergi" required>
                  <option value="">Pilih atau ketik alergi</option>
                </select>
                <div class="invalid-feedback" id="error-alergi"></div>
              </div>
              <div class="col-md-6">
                <label for="sekolah" class="form-label fw-semibold">
                  Sekolah <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control" id="sekolah" name="sekolah" placeholder="Contoh: SDN 01 Menteng"
                  required />
                <div class="invalid-feedback" id="error-sekolah"></div>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" id="submitButton" class="btn btn-primary d-flex align-items-center gap-2">
                <i class="bi bi-check-lg"></i>
                Simpan Data
              </button>
              <a href="/" class="btn btn-outline-secondary">Batal</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </main>

 
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="/form.js"></script>
</body>

</html>
