<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil dengan AJAX</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: rgb(66, 167, 66);
        }

        #hasil-profil {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 25px;

        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Data Profil</h2>
        <button id="btn-tampil">Tampilkan Profil</button>
        <div id="hasil-profil"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#btn-tampil').click(function () {
                $.ajax({
                    url: 'data.php',
                    type: 'GET',
                    dataType: 'json',
                    success: function (data) {
                        $('#hasil-profil').html(`Nama: ${data.nama} | Pekerjaan: ${data.pekerjaan} | Lokasi: ${data.lokasi}`);
                    },
                    error: function (xhr, status, error) {
                        console.error('Ada masalah dengan AJAX operation:', error);
                        $('#hasil-profil').html('Gagal mengambil data.');
                    }
                });
            });
        });
    </script>
</body>

</html>
